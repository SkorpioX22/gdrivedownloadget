<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Drive Direct Link Converter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg: #090b10;
      --panel: rgba(15, 19, 31, 0.9);
      --line: rgba(130, 154, 255, 0.2);
      --line-strong: rgba(130, 154, 255, 0.45);
      --text: #e9eeff;
      --muted: #98a3c7;
      --accent: #85ffe0;
      --accent-2: #89a9ff;
      --danger: #ff8ca1;
      --shadow: 0 14px 40px rgba(0, 0, 0, 0.55);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: "JetBrains Mono", "Fira Code", monospace;
      background: radial-gradient(circle at 20% 0%, #10172e 0%, var(--bg) 45%);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
      letter-spacing: 0.01em;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background:
        linear-gradient(to right, rgba(130, 154, 255, 0.08) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(130, 154, 255, 0.08) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at 50% 40%, black 30%, transparent 90%);
      animation: gridFloat 18s ease-in-out infinite;
    }

    body::after {
      background:
        radial-gradient(circle at 85% 8%, rgba(133, 255, 224, 0.16), transparent 30%),
        radial-gradient(circle at 12% 100%, rgba(137, 169, 255, 0.12), transparent 30%);
    }

    .container {
      width: 90%;
      max-width: 500px;
      padding: 24px;
      background: var(--panel);
      border-radius: 14px;
      text-align: left;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      animation: fadeInUp 500ms ease-out;
    }

    h1 {
      font-size: 1.35rem;
      margin-bottom: 10px;
      letter-spacing: 0.03em;
    }

    p {
      font-size: 0.86rem;
      color: var(--muted);
      margin-bottom: 20px;
      line-height: 1.45;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(8, 11, 18, 0.8);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
    }

    input::placeholder {
      color: #7f8cb4;
    }

    input:focus {
      border-color: var(--line-strong);
      box-shadow: 0 0 0 3px rgba(137, 169, 255, 0.2);
      transform: translateY(-1px);
    }

    button {
      margin-top: 15px;
      padding: 11px 18px;
      border: 1px solid rgba(137, 169, 255, 0.45);
      border-radius: 8px;
      background: linear-gradient(145deg, rgba(137, 169, 255, 0.2), rgba(133, 255, 224, 0.2));
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.02em;
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease, background 220ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: rgba(133, 255, 224, 0.75);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.28), 0 0 20px rgba(133, 255, 224, 0.14);
      background: linear-gradient(145deg, rgba(137, 169, 255, 0.3), rgba(133, 255, 224, 0.25));
    }

    button:active {
      transform: translateY(0);
    }

    .output {
      margin-top: 20px;
      word-break: break-all;
      padding: 12px;
      background: rgba(8, 11, 18, 0.76);
      border: 1px solid var(--line);
      border-radius: 8px;
      text-align: left;
      font-size: 0.9rem;
      color: var(--accent);
      transform-origin: top;
      opacity: 0;
      transform: translateY(8px) scale(0.985);
      transition: opacity 220ms ease, transform 220ms ease, border-color 220ms ease;
    }

    .output.is-visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .output.error {
      color: var(--danger);
      border-color: rgba(255, 140, 161, 0.45);
    }

    .badge {
      display: inline-block;
      font-size: 0.72rem;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 10px;
      margin-bottom: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes gridFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="badge">Encrypted Aesthetic</span>
    <h1>Drive Direct Link</h1>
    <p>Paste a Google Drive sharing URL below. Conversion happens locally.</p>
    <input id="inputUrl" type="text" placeholder="https://drive.google.com/file/d/FILE_ID/view?usp=sharing">

    <button onclick="convert()">Convert</button>

    <div id="output" class="output" style="display:none;"></div>
  </div>

  <script>
    function convert() {
      const input = document.getElementById("inputUrl").value.trim();
      const output = document.getElementById("output");

      const match = input.match(/\/d\/([^/]+)\//);

      if (!match) {
        output.style.display = "block";
        output.classList.add("is-visible", "error");
        output.textContent = "Invalid Google Drive URL.";
        return;
      }

      const fileId = match[1];
      const downloadUrl = "https://drive.google.com/uc?export=download&id=" + fileId;

      output.style.display = "block";
      output.classList.remove("error");
      output.classList.add("is-visible");
      output.textContent = downloadUrl;
    }
  </script>
</body>
</html>
