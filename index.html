<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Drive Direct Link Converter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg: #000000;
      --surface: #000000;
      --line: #ffffff;
      --line-soft: rgba(255, 255, 255, 0.5);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.72);
      --danger: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: "JetBrains Mono", "Fira Code", monospace;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 16px;
      overflow: hidden;
      letter-spacing: 0.01em;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.05) 0px,
          rgba(255, 255, 255, 0.05) 1px,
          transparent 2px,
          transparent 4px
        );
      opacity: 0.23;
      animation: crtScan 9s linear infinite;
    }

    .container {
      width: 90%;
      max-width: 500px;
      padding: 24px;
      background: var(--surface);
      border-radius: 0;
      text-align: left;
      border: 1px solid var(--line);
      animation: fadeInUp 380ms ease-out;
    }

    h1 {
      font-size: 1.35rem;
      margin-bottom: 10px;
      letter-spacing: 0.03em;
    }

    p {
      font-size: 0.86rem;
      color: var(--muted);
      margin-bottom: 20px;
      line-height: 1.45;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 0;
      border: 1px solid var(--line);
      background: #000;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.45);
    }

    input:focus {
      border-color: var(--line);
      box-shadow: inset 0 0 0 1px var(--line);
      transform: none;
    }

    button {
      margin-top: 15px;
      padding: 11px 18px;
      border: 1px solid var(--line);
      border-radius: 0;
      background: #000;
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.02em;
      transition: background 140ms ease, color 140ms ease, transform 120ms ease;
    }

    button:hover {
      background: #fff;
      color: #000;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .output {
      margin-top: 20px;
      word-break: break-all;
      padding: 12px;
      background: #000;
      border: 1px solid var(--line);
      border-radius: 0;
      text-align: left;
      font-size: 0.9rem;
      color: var(--text);
      transform-origin: top;
      opacity: 0;
      transform: translateY(8px) scale(0.985);
      transition: opacity 220ms ease, transform 220ms ease, border-color 220ms ease;
    }

    .output.is-visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .output.error {
      color: var(--danger);
      border-style: dashed;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes crtScan {
      0% { transform: translateY(0); }
      100% { transform: translateY(4px); }
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="badge">Encrypted Aesthetic</span>
    <h1>Drive Direct Link</h1>
    <p>Paste a Google Drive sharing URL below. Conversion happens locally.</p>
    <input id="inputUrl" type="text" placeholder="https://drive.google.com/file/d/FILE_ID/view?usp=sharing">

    <button onclick="convert()">Convert</button>

    <div id="output" class="output" style="display:none;"></div>
  </div>

  <script>
    function convert() {
      const input = document.getElementById("inputUrl").value.trim();
      const output = document.getElementById("output");

      const match = input.match(/\/d\/([^/]+)\//);

      if (!match) {
        output.style.display = "block";
        output.classList.add("is-visible", "error");
        output.textContent = "Invalid Google Drive URL.";
        return;
      }

      const fileId = match[1];
      const downloadUrl = "https://drive.google.com/uc?export=download&id=" + fileId;

      output.style.display = "block";
      output.classList.remove("error");
      output.classList.add("is-visible");
      output.textContent = downloadUrl;
    }
  </script>
</body>
</html>
