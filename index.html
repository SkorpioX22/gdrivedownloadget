<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Drive Direct Link Converter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'JetBrains Mono', monospace, monospace;
      background: #121212;
      color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      width: 90%;
      max-width: 500px;
      padding: 20px;
      background: #1e1e1e;
      border-radius: 8px;
      text-align: center;
    }

    h1 {
      font-size: 1.3rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 4px;
      border: 1px solid #555;
      background: #121212;
      color: #f5f5f5;
      font-family: inherit;
      font-size: 0.95rem;
    }

    button {
      margin-top: 15px;
      padding: 10px 16px;
      border: none;
      border-radius: 4px;
      background: #00ff88;
      color: #000;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    button:hover {
      background: #00e67a;
    }

    .output {
      margin-top: 20px;
      word-break: break-all;
      padding: 10px;
      background: #121212;
      border: 1px solid #555;
      border-radius: 4px;
      text-align: left;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Drive Direct Link</h1>
    <p>Paste a Google Drive sharing URL below. Conversion happens locally.</p>
    <input id="inputUrl" type="text" placeholder="https://drive.google.com/file/d/FILE_ID/view?usp=sharing">

    <button onclick="convert()">Convert</button>

    <div id="output" class="output" style="display:none;"></div>
  </div>

  <script>
    function convert() {
      const input = document.getElementById("inputUrl").value.trim();
      const output = document.getElementById("output");

      const match = input.match(/\/d\/([^/]+)\//);

      if (!match) {
        output.style.display = "block";
        output.textContent = "Invalid Google Drive URL.";
        return;
      }

      const fileId = match[1];
      const downloadUrl = "https://drive.google.com/uc?export=download&id=" + fileId;

      output.style.display = "block";
      output.innerHTML = downloadUrl;
    }
  </script>
</body>
</html>
